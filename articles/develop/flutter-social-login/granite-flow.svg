<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760">
  <rect width="1600" height="760" fill="#0b1220"/>
  <text x="90" y="100" fill="#f8fafc" font-family="Arial, sans-serif" font-size="44" font-weight="700">Granite · native auth bridge</text>
  <text x="92" y="140" fill="#94a3b8" font-family="Arial, sans-serif" font-size="21">The WebView asks; Flutter authenticates; the server owns the web session</text>
  <path d="M350 380H500M760 380H910M1170 380H1300" stroke="#475569" stroke-width="5"/>
  <path d="M500 380l-24-14v28zM910 380l-24-14v28zM1300 380l-24-14v28z" fill="#fb7185"/>
  <rect x="80" y="270" width="270" height="220" rx="20" fill="#102a3a" stroke="#22d3ee" stroke-width="4"/>
  <text x="130" y="350" fill="#67e8f9" font-family="Arial, sans-serif" font-size="28" font-weight="700">WebView</text>
  <text x="130" y="400" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">auth.native</text>
  <text x="130" y="435" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">provider + returnTo</text>
  <rect x="500" y="270" width="260" height="220" rx="20" fill="#17332f" stroke="#34d399" stroke-width="4"/>
  <text x="545" y="350" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="28" font-weight="700">Flutter</text>
  <text x="545" y="400" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">native SDK</text>
  <text x="545" y="435" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">cancel / timeout</text>
  <rect x="910" y="270" width="260" height="220" rx="20" fill="#302044" stroke="#a78bfa" stroke-width="4"/>
  <text x="950" y="350" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="28" font-weight="700">Session API</text>
  <text x="950" y="400" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">POST /api/auth</text>
  <text x="950" y="435" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">native/session</text>
  <rect x="1300" y="270" width="220" height="220" rx="20" fill="#3b2530" stroke="#fb7185" stroke-width="4"/>
  <text x="1340" y="350" fill="#fda4af" font-family="Arial, sans-serif" font-size="28" font-weight="700">Cookie</text>
  <text x="1340" y="400" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">HttpOnly</text>
  <text x="1340" y="435" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">web session</text>
  <text x="90" y="640" fill="#64748b" font-family="Arial, sans-serif" font-size="20">returnTo는 내부 경로만 허용 · token은 bridge log에 남기지 않음</text>
</svg>